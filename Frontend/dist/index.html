// ── useToast ──
function useToast() {
  const [toasts,setToasts] = useState([]);
  const show = useCallback((msg,type="success")=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3800);
  },[]);
  return {toasts,show};
}

function Toasts({toasts}){
  return <div style={{position:"fixed",top:20,right:20,zIndex:9999,display:"flex",flexDirection:"column",gap:8}}>
    {toasts.map(t=>(
      <div key={t.id} style={{padding:"12px 18px",borderRadius:2,fontFamily:C.mono,fontSize:11,letterSpacing:".05em",animation:"slideIn .3s ease",maxWidth:300,border:"1px solid",
        background:t.type==="error"?"#2d0a0a":t.type==="info"?"#0a1428":"#0a1f12",
        borderColor:t.type==="error"?"rgba(224,82,82,.3)":t.type==="info"?"rgba(91,143,212,.3)":"rgba(76,175,120,.3)",
        color:t.type==="error"?C.red:t.type==="info"?C.blue:C.green}}>
        {t.type==="error"?"✗ ":t.type==="info"?"ℹ ":"✓ "}{t.msg}
      </div>
    ))}
  </div>;
}
function Sparkline({data,color,w=80,h=30}){
  if(!data||data.length<2)return null;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${((i/(data.length-1))*w).toFixed(1)},${(h-((v-mn)/rng)*h).toFixed(1)}`).join(" ");
  const last=pts.split(" ").slice(-1)[0].split(",");
  return <svg width={w} height={h} style={{overflow:"visible",flexShrink:0}}>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="1.6" strokeLinejoin="round" strokeLinecap="round" opacity="0.9"/>
    <circle cx={last[0]} cy={last[1]} r="2.8" fill={color}/>
  </svg>;
}

function EMICalculator({token,toast}){
  const [form,setForm]=useState({loan_amount:300000,interest_rate:10.5,tenure:36});
  const localCalc=(f)=>{
    const p=f.loan_amount,r=(f.interest_rate/100)/12,n=f.tenure;
    if(!p||!r||!n)return null;
    const emi=(p*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
    const total=emi*n;
    return{emi:Math.round(emi),total_repayment:Math.round(total),total_interest:Math.round(total-p)};
  };
  const [result,setResult]=useState(()=>localCalc(form));
  useEffect(()=>{setResult(localCalc(form));},[form]);
  const res=result;
  const scheduleData=res?Array.from({length:Math.min(form.tenure,12)},(_,i)=>{
    const r=(form.interest_rate/100)/12;const bal=form.loan_amount*Math.pow(1+r,i);

        <div className="card fade-up" style={{padding:"28px 26px",textAlign:"center",border:`1px solid rgba(200,169,110,.28)`,animationDelay:"120ms",position:"relative"}}>

// ── Smart Invest ──
function SmartInvest({token,toast}){
  const totalIncome=MOCK_TXN.filter(t=>t.type==="credit").reduce((s,t)=>s+t.amount,0);
  const totalExpenses=MOCK_TXN.filter(t=>t.type==="debit").reduce((s,t)=>s+t.amount,0);
  const freeSavings=totalIncome-totalExpenses;
  const emergencyBuffer=Math.round(freeSavings*0.20);
  const investable=Math.max(0,freeSavings-emergencyBuffer);
  const [monthlyInvest,setMonthlyInvest]=useState(null);
  const [tenure,setTenure]=useState(5);
  const [selectedPlan,setSelectedPlan]=useState("sip_nifty");
  const TENURES=[1,3,5,10,15,20];
  const INVESTMENT_OPTIONS=[
    {id:"sip_nifty",name:"Nifty 50 Index SIP",type:"Mutual Fund",rateMin:10,rateMax:14,riskLabel:"Low-Medium",riskColor:"#4caf78",icon:"📈",tags:["Diversified","Tax Efficient"],desc:"Tracks India's top 50 companies.",minAmount:500},
    {id:"ppf",name:"PPF",type:"Government Scheme",rateMin:7.1,rateMax:7.1,riskLabel:"Zero Risk",riskColor:"#4caf78",icon:"🏛️",tags:["Tax-Free","80C Deduction"],desc:"Government-backed, completely tax-free.",minAmount:500},
    {id:"stocks_bluechip",name:"Blue-chip Stocks",type:"Direct Equity",rateMin:12,rateMax:20,riskLabel:"Medium-High",riskColor:"#e8a540",icon:"💹",tags:["Direct ownership","Dividend"],desc:"Reliance, HDFC, TCS etc.",minAmount:2000},
    {id:"fd",name:"Fixed Deposit",type:"Fixed Income",rateMin:6.5,rateMax:7.5,riskLabel:"Zero Risk",riskColor:"#4caf78",icon:"🏦",tags:["Guaranteed","Flexible"],desc:"Safe, predictable returns.",minAmount:1000},
    {id:"gold_sgb",name:"Sovereign Gold Bond",type:"Gold",rateMin:8,rateMax:13,riskLabel:"Low",riskColor:"#c8a96e",icon:"🥇",tags:["Gold + 2.5% interest","Tax-free"],desc:"Best way to invest in gold.",minAmount:1000},
  ];
  const calcSIP=(monthly,annualRate,years)=>{
    const r=annualRate/100/12,n=years*12;
    return Math.round(monthly*(((Math.pow(1+r,n)-1)/r)*(1+r)));
  };
  const amt=monthlyInvest!==null?monthlyInvest:Math.round(investable*0.5);
  const activePlan=INVESTMENT_OPTIONS.find(p=>p.id===selectedPlan)||INVESTMENT_OPTIONS[0];
  const midRate=(activePlan.rateMin+activePlan.rateMax)/2;
  const growthData=TENURES.map(yr=>({
    year:`${yr}yr`,invested:amt*yr*12,
    value_mid:calcSIP(amt,midRate,yr),
    value_low:calcSIP(amt,activePlan.rateMin,yr),
    value_high:calcSIP(amt,activePlan.rateMax,yr),
  }));
  const tenureResult=growthData.find(d=>d.year===`${tenure}yr`)||growthData[2];
  const gain=tenureResult.value_mid-tenureResult.invested;
  const multiplier=tenureResult.invested>0?(tenureResult.value_mid/tenureResult.invested).toFixed(1):1;
  return <div style={{padding:"28px 30px",display:"flex",flexDirection:"column",gap:22}}>
    <div className="fade-up">
      <div style={{fontSize:9,color:C.gold,letterSpacing:".2em",fontFamily:C.mono,marginBottom:8}}>SMART INVEST</div>
      <h1 style={{fontFamily:C.serif,fontSize:30,fontWeight:400,color:C.text0,lineHeight:1.1}}>Investment <em style={{fontStyle:"italic",color:C.gold}}>Planner</em></h1>
    </div>
    <div className="card fade-up" style={{padding:"22px 26px"}}>
      <div style={{fontSize:9,color:C.text2,letterSpacing:".15em",fontFamily:C.mono,textTransform:"uppercase",marginBottom:18}}>Your Monthly Money Flow</div>
      <div style={{display:"flex",alignItems:"center",gap:0,overflowX:"auto"}}>
        {[{label:"Income",value:totalIncome,color:C.green},{label:"Expenses",value:-totalExpenses,color:C.red},{label:"Savings",value:freeSavings,color:C.gold},{label:"Emergency (20%)",value:-emergencyBuffer,color:"#888"},{label:"Investable",value:investable,color:C.blue}].map((item,i)=>(
          <div key={item.label} style={{display:"flex",alignItems:"center"}}>
            <div style={{textAlign:"center",padding:"0 18px",minWidth:110}}>
              <div style={{fontSize:8,color:C.text3,fontFamily:C.mono,letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>{item.label}</div>
              <div style={{fontSize:20,color:item.color,fontFamily:C.serif,fontWeight:400}}>{item.value<0?"-":""}₹{Math.abs(item.value/1000).toFixed(1)}K</div>
            </div>
            {i<4&&<div style={{fontSize:18,color:C.text3,flexShrink:0}}>→</div>}
          </div>
        ))}
      </div>
    </div>
    <div className="card fade-up" style={{padding:"22px 26px",animationDelay:"80ms"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:9,color:C.text2,letterSpacing:".15em",fontFamily:C.mono,textTransform:"uppercase"}}>Monthly Investment Amount</div>
        <div style={{fontSize:24,color:C.gold,fontFamily:C.serif}}>₹{amt.toLocaleString("en-IN")}</div>
      </div>
      <input type="range" min={500} max={investable} step={500} value={amt} onChange={e=>setMonthlyInvest(Number(e.target.value))}/>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
        <span style={{fontSize:9,color:C.text3,fontFamily:C.mono}}>₹500 min</span>
        <span style={{fontSize:9,color:C.text3,fontFamily:C.mono}}>₹{(investable/1000).toFixed(0)}K max</span>
      </div>
    </div>
    <div className="fade-up" style={{animationDelay:"120ms"}}>
      <div style={{fontSize:9,color:C.text2,letterSpacing:".15em",fontFamily:C.mono,textTransform:"uppercase",marginBottom:14}}>Choose Investment Option</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}}>
        {INVESTMENT_OPTIONS.map(opt=>{
          const isSelected=selectedPlan===opt.id;
          const fv5yr=calcSIP(amt,(opt.rateMin+opt.rateMax)/2,5);
          return <div key={opt.id} className="card" onClick={()=>{setSelectedPlan(opt.id);toast.show(`Modelling: ${opt.name}`,"success");}}
            style={{padding:"18px 20px",cursor:"pointer",border:isSelected?`1px solid ${C.gold}70`:`1px solid ${C.border}`,background:isSelected?"rgba(200,169,110,.07)":C.bg2,transition:"all .2s"}}>
            <div style={{fontSize:20,marginBottom:8}}>{opt.icon}</div>
            <div style={{fontSize:13,color:isSelected?C.gold:C.text0,marginBottom:4}}>{opt.name}</div>
            <div style={{fontSize:9,color:C.text3,fontFamily:C.mono,marginBottom:8}}>{opt.rateMin===opt.rateMax?`${opt.rateMin}%`:`${opt.rateMin}–${opt.rateMax}%`} p.a. · {opt.riskLabel}</div>
            <div style={{fontSize:12,color:C.green,fontFamily:C.mono}}>5yr: ₹{(fv5yr/1000).toFixed(0)}K</div>
          </div>;
        })}
      </div>
    </div>
    <div className="card fade-up" style={{padding:"26px 28px",animationDelay:"160ms"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <div style={{fontSize:9,color:C.gold,letterSpacing:".15em",fontFamily:C.mono,textTransform:"uppercase",marginBottom:6}}>◆ GROWTH PROJECTION · {activePlan.name}</div>
          <div style={{fontSize:13,color:C.text2,fontFamily:C.mono}}>Monthly SIP of ₹{amt.toLocaleString("en-IN")}</div>
        </div>
        <div style={{display:"flex",gap:4}}>
          {TENURES.map(yr=>(
            <button key={yr} onClick={()=>setTenure(yr)} style={{padding:"4px 10px",fontSize:9,fontFamily:C.mono,border:`1px solid ${tenure===yr?C.gold:C.border}`,background:tenure===yr?"rgba(200,169,110,.15)":"transparent",color:tenure===yr?C.gold:C.text3,cursor:"pointer",borderRadius:1,transition:"all .15s"}}>{yr}yr</button>
          ))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:24}}>
        {[{label:"You Invest",value:`₹${(tenureResult.invested/1000).toFixed(0)}K`,color:C.text1},{label:"Expected Value",value:`₹${(tenureResult.value_mid/1000).toFixed(0)}K`,color:C.green},{label:"Total Gain",value:`+₹${(gain/1000).toFixed(0)}K`,color:C.gold},{label:"Multiplier",value:`${multiplier}×`,color:C.blue}].map(kpi=>(
          <div key={kpi.label} style={{padding:"12px 14px",background:C.bg3,border:`1px solid ${C.border}`,borderRadius:2}}>
            <div style={{fontSize:8,color:C.text3,fontFamily:C.mono,letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>{kpi.label}</div>
            <div style={{fontSize:20,color:kpi.color,fontFamily:C.serif,fontWeight:400}}>{kpi.value}</div>
          </div>
        ))}
      </div>
      <ResponsiveContainer width="100%" height={240}>
        <AreaChart data={growthData} margin={{top:10,right:10,left:0,bottom:0}}>
          <defs>
            <linearGradient id="gradMid2" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.green} stopOpacity={0.35}/><stop offset="95%" stopColor={C.green} stopOpacity={0}/></linearGradient>
            <linearGradient id="gradInv2" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.gold} stopOpacity={0.2}/><stop offset="95%" stopColor={C.gold} stopOpacity={0}/></linearGradient>
          </defs>
          <CartesianGrid strokeDasharray="3 3" stroke={C.border} vertical={false}/>
          <XAxis dataKey="year" tick={{fill:C.text3,fontSize:10,fontFamily:"IBM Plex Mono"}} axisLine={false} tickLine={false}/>
          <YAxis tickFormatter={v=>`₹${(v/1000).toFixed(0)}K`} tick={{fill:C.text3,fontSize:9,fontFamily:"IBM Plex Mono"}} axisLine={false} tickLine={false} width={60}/>
          <Tooltip contentStyle={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:2,fontFamily:"IBM Plex Mono",fontSize:11}} labelStyle={{color:C.gold}} formatter={(v,name)=>[`₹${(v/1000).toFixed(1)}K`,name]}/>
          <Area type="monotone" dataKey="value_mid" name="Expected" stroke={C.green} fill="url(#gradMid2)" strokeWidth={2}/>
          <Area type="monotone" dataKey="value_high" name="Optimistic" stroke={C.blue} fill="none" strokeWidth={1.5} strokeDasharray="4 3"/>
          <Area type="monotone" dataKey="invested" name="Invested" stroke={C.text3} fill="url(#gradInv2)" strokeWidth={1.5}/>
        </AreaChart>
      </ResponsiveContainer>
    </div>
  </div>;
}

// ── Settings ──
function Settings({token,toast}){
  const [notifs,setNotifs]=useState({email:true,sms:false,push:true});
  const [currency,setCurrency]=useState("INR");
  const [theme,setTheme]=useState("dark");
  return <div style={{padding:28,display:"flex",flexDirection:"column",gap:22}}>
    <div className="fade-up">
      <div style={{fontSize:9,color:C.gold,letterSpacing:".2em",fontFamily:C.mono,marginBottom:8}}>PREFERENCES</div>
      <h1 style={{fontFamily:C.serif,fontSize:28,fontWeight:400,color:C.text0}}>App <em style={{fontStyle:"italic",color:C.gold}}>Settings</em></h1>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
      <div className="card fade-up" style={{padding:"24px 26px",animationDelay:"60ms"}}>
        <div style={{fontSize:9,color:C.text2,letterSpacing:".15em",textTransform:"uppercase",fontFamily:C.mono,marginBottom:18}}>Notifications</div>
        {[{key:"email",label:"Email Alerts",desc:"Weekly spending summary & insights"},{key:"sms",label:"SMS Alerts",desc:"Transaction notifications via SMS"},{key:"push",label:"Push Notifications",desc:"Real-time budget breach alerts"}].map(item=>(
          <div key={item.key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid "+C.border}}>
            <div><div style={{fontSize:13,color:C.text1,marginBottom:2}}>{item.label}</div><div style={{fontSize:10,color:C.text3,fontFamily:C.mono}}>{item.desc}</div></div>
            <div onClick={()=>setNotifs(p=>({...p,[item.key]:!p[item.key]}))} style={{width:40,height:22,borderRadius:11,background:notifs[item.key]?C.gold:"rgba(200,192,176,.15)",cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
              <div style={{position:"absolute",top:3,left:notifs[item.key]?20:3,width:16,height:16,borderRadius:"50%",background:"#fff",transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.3)"}}/>
            </div>
          </div>
        ))}
      </div>
      <div className="card fade-up" style={{padding:"24px 26px",animationDelay:"120ms"}}>
        <div style={{fontSize:9,color:C.text2,letterSpacing:".15em",textTransform:"uppercase",fontFamily:C.mono,marginBottom:18}}>Preferences</div>
        <div style={{marginBottom:20}}>
          <label style={{fontSize:10,color:C.text3,fontFamily:C.mono,letterSpacing:".08em",display:"block",marginBottom:8}}>DEFAULT CURRENCY</label>
          <select className="app-input" value={currency} onChange={e=>setCurrency(e.target.value)}>
            <option value="INR">INR — Indian Rupee (₹)</option>
            <option value="USD">USD — US Dollar ($)</option>
            <option value="EUR">EUR — Euro (€)</option>
          </select>
        </div>
        <div>
          <label style={{fontSize:10,color:C.text3,fontFamily:C.mono,letterSpacing:".08em",display:"block",marginBottom:8}}>THEME</label>
          <div style={{display:"flex",gap:6}}>
            {["dark","darker","oled"].map(t=>(
              <button key={t} onClick={()=>{setTheme(t);toast.show(`Theme: ${t}`,"success");}} style={{flex:1,padding:"9px",border:`1px solid ${theme===t?C.gold:C.border}`,background:theme===t?"rgba(200,169,110,.1)":"transparent",color:theme===t?C.gold:C.text3,fontFamily:C.mono,fontSize:9,letterSpacing:".08em",textTransform:"uppercase",cursor:"pointer",borderRadius:1,transition:"all .18s"}}>{t}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
    <div className="card fade-up" style={{padding:"24px 26px",animationDelay:"180ms"}}>
      <div style={{fontSize:9,color:C.text2,letterSpacing:".15em",textTransform:"uppercase",fontFamily:C.mono,marginBottom:18}}>Account</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12}}>
        {[{label:"Account Type",value:"Demo Account"},{label:"Data Source",value:"Mock Data"},{label:"API Status",value:"Demo Mode",color:C.gold},{label:"Version",value:"FinTrack 2.0"}].map(s=>(
          <div key={s.label} style={{padding:"12px 14px",background:C.bg3,border:"1px solid "+C.border,borderRadius:1}}>
            <div style={{fontSize:8,color:C.text3,fontFamily:C.mono,letterSpacing:".1em",marginBottom:6}}>{s.label.toUpperCase()}</div>
            <div style={{fontSize:14,color:s.color||C.text1,fontFamily:C.mono}}>{s.value}</div>
          </div>
        ))}
      </div>
      <div style={{marginTop:18,display:"flex",gap:10}}>
        <button className="btn-ghost" onClick={()=>toast.show("Data export coming soon","info")}>Export Data</button>
        <button className="btn-ghost" style={{color:C.red,borderColor:"rgba(224,82,82,.2)"}} onClick={()=>toast.show("Account cleared","success")}>Clear Data</button>
      </div>
    </div>
  </div>;
}

// ── App Root ──
function App(){
  const [user,setUser]=useState(null);
  const [token,setToken]=useState(null);
  const [page,setPage]=useState("dashboard");
  const toast=useToast();
  const handleLogin=useCallback((u,t)=>{setUser(u);setToken(t);},[]);
  const handleLogout=useCallback(()=>{setUser(null);setToken(null);setPage("dashboard");toast.show("Signed out","info");},[]);
  if(!user||!token){
    return <><Toasts toasts={toast.toasts}/><LoginScreen onLogin={handleLogin} toast={toast}/></>;
  }
  const pages={
    dashboard:<Dashboard token={token} toast={toast}/>,
    transactions:<Transactions token={token} toast={toast}/>,
    ai:<AIInsights token={token} toast={toast}/>,
    loan:<LoanPlanner token={token} toast={toast}/>,
    emi:<EMICalculator token={token} toast={toast}/>,
    stocks:<StocksInvest token={token} toast={toast}/>,
    insurance:<InsurancePlanner token={token} toast={toast}/>,
    invest:<SmartInvest token={token} toast={toast}/>,
    settings:<Settings token={token} toast={toast}/>,
  };
  return <div style={{display:"flex",minHeight:"100vh",background:C.bg,color:C.text0,fontFamily:C.sans}}>
    <Toasts toasts={toast.toasts}/>
    <Sidebar page={page} setPage={setPage} user={user} onLogout={handleLogout}/>
    <main style={{flex:1,overflowY:"auto"}} className="fade-in">{pages[page]||pages.dashboard}</main>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
